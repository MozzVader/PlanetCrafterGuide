<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Crafter Guide | Select Language</title>
    <meta name="description" content="Complete guide for Planet Crafter. Choose your language: English or Spanish.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a1a;
            --bg-card: #161b22;
            --border-color: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-purple: #a855f7;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .lang-selector {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInUp 1s ease;
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }

        .cards {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 24px;
        }

        .lang-card {
            width: 260px;
            padding: 40px 32px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .lang-card:hover {
            transform: translateY(-6px);
        }

        .lang-card.en:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2), 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .lang-card.es:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2), 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .lang-flag {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .lang-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .lang-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-note {
            position: relative;
            z-index: 1;
            margin-top: 60px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .lang-card { width: 220px; padding: 32px 24px; }
            .cards { gap: 16px; }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="lang-selector">
        <div class="logo">🪐</div>
        <h1>Planet Crafter Guide</h1>
        <p class="subtitle">Choose your language / Elegi tu idioma</p>

        <div class="cards">
            <a href="en.html" class="lang-card en" id="btnEn">
                <div class="lang-flag">🇺🇸</div>
                <div class="lang-name">English</div>
                <div class="lang-label">Guide in English</div>
            </a>
            <a href="es.html" class="lang-card es" id="btnEs">
                <div class="lang-flag">🇦🇷</div>
                <div class="lang-name">Español</div>
                <div class="lang-label">Guia en Español</div>
            </a>
        </div>
    </div>

    <p class="footer-note">Unofficial fan-made guide</p>

    <script>
        // Starfield
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2 + 0.5,
                sp: Math.random() * 0.3 + 0.05,
                o: Math.random() * 0.8 + 0.2,
                tp: Math.random() * Math.PI * 2,
                ts: Math.random() * 0.02 + 0.005
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.tp += s.ts;
                const op = s.o * (0.5 + 0.5 * Math.sin(s.tp));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200,220,255,${op})`;
                ctx.fill();
                s.y += s.sp;
                if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Auto-redirect if user has a preference
        const lang = localStorage.getItem('pc-lang');
        if (lang === 'en') window.location.href = 'en.html';
        if (lang === 'es') window.location.href = 'es.html';
    </script>
</body>
</html>
